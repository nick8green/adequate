name: Build & Push Docker Images

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode: all or changed"
        required: false
        default: "changed"
        type: choice
        options:
          - changed
          - all

jobs:
  generate-matrix:
    name: Generate Docker build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate matrix
        id: set-matrix
        run: |
          mode="${{ github.event.inputs.mode || 'changed' }}"
          echo "Mode: $mode"

          if [ "$mode" = "all" ]; then
            echo "Building all apps with Dockerfiles..."
            apps=$(find apps -mindepth 1 -maxdepth 1 -type d | xargs -n1 basename)
          else
            echo "Building only changed apps with Dockerfiles..."
            changed_files=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} ${{ github.sha }})
            apps=$(echo "$changed_files" | grep '^apps/' | cut -d/ -f2 | sort -u | uniq)
          fi

          valid_apps=()
          for app in $apps; do
            pkg_json="apps/$app/package.json"
            if [ -f "apps/$app/Dockerfile" ] && [ -f "$pkg_json" ]; then
              if [ "$branch" = "release" ]; then
                version=$(jq -r .version "$pkg_json")
              else
                version="$branch"
              fi
              # Sanitize version (for Docker tag compatibility)
              version=$(echo "$version" | tr '/' '-' | tr -c 'a-zA-Z0-9_.-' '-')
              valid_apps+=("{\"app\": \"$app\", \"version\": \"$version\"}")
            fi
          done

          if [ ${#valid_apps[@]} -eq 0 ]; then
            matrix_json="{\"include\": []}"
          else
            matrix_json="{\"include\": [$(IFS=,; echo "${valid_apps[*]}")]}"
          fi

          echo "Generated matrix: $matrix_json"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Push ${{ matrix.app }}
    needs: generate-matrix
    if: needs.generate-matrix.outputs.matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: nick8green/workflows/.github/workflows/docker-build.yml@main
    with:
      context: .
      file: apps/${{ matrix.app }}/Dockerfile
      reference: ${{ github.repository_owner }}/${{ matrix.app }}
      tag: ${{ matrix.version }}
      timeout: 30
    secrets:
      password: ${{ secrets.GITHUB_TOKEN }}
